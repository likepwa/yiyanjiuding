<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>一言就顶</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:"PingFang SC","Microsoft Yahei",sans-serif; -webkit-tap-highlight-color:transparent; }
        body { background-color:#12141c; padding-bottom:120px; }
        .header { padding:24px 16px 14px; text-align:center; }
        .header h1 { font-size:26px; color:#e6e8f0; font-weight:600; letter-spacing:2px; margin-bottom:12px; }
        .header p { font-size:13px; color:#8a8e9b; line-height:1.6; }
        .rank-container { padding:0 12px; }
        .rank-list { display:flex; flex-direction:column; gap:14px; }
        .card { background:rgba(255,255,255,0.06); border-radius:18px; padding:18px; box-shadow:0 4px 20px rgba(0,0,0,0.25); }
        .card-gold { background:linear-gradient(135deg,rgba(255,215,0,0.25),rgba(255,180,0,0.15)); border:2px solid rgba(255,215,0,0.7); box-shadow:0 0 30px rgba(255,215,0,0.4),0 4px 20px rgba(0,0,0,0.25); position:relative; overflow:hidden; }
        .card-gold::before { content:''; position:absolute; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle at 30% 20%,rgba(255,215,0,0.3),transparent 50%); pointer-events:none; z-index:0; }
        .card-gold .content { color:#ffd700; font-weight:500; position:relative; z-index:1; }
        .card-gold .card-sign { color:#e6c200; position:relative; z-index:1; }
        .card-silver { background:linear-gradient(135deg,rgba(192,192,192,0.25),rgba(160,160,160,0.15)); border:2px solid rgba(192,192,192,0.7); box-shadow:0 0 25px rgba(192,192,192,0.35),0 4px 20px rgba(0,0,0,0.25); position:relative; overflow:hidden; }
        .card-silver::before { content:''; position:absolute; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle at 30% 20%,rgba(192,192,192,0.3),transparent 50%); pointer-events:none; z-index:0; }
        .card-silver .content { color:#e0e0e0; font-weight:500; position:relative; z-index:1; }
        .card-silver .card-sign { color:#c0c0c0; position:relative; z-index:1; }
        .card-bronze { background:linear-gradient(135deg,rgba(205,127,50,0.25),rgba(170,100,40,0.15)); border:2px solid rgba(205,127,50,0.7); box-shadow:0 0 25px rgba(205,127,50,0.35),0 4px 20px rgba(0,0,0,0.25); position:relative; overflow:hidden; }
        .card-bronze::before { content:''; position:absolute; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle at 30% 20%,rgba(205,127,50,0.3),transparent 50%); pointer-events:none; z-index:0; }
        .card-bronze .content { color:#8a8e9b; font-weight:500; position:relative; z-index:1; }
        .card-bronze .card-sign { color:#8a8e9b; position:relative; z-index:1; }
        .card-normal { border:1px solid rgba(255,255,255,0.12); }
        .card-normal .content { color:#8a8e9b; }
        .card-crowded { border:1px solid rgba(255,255,255,0.06); padding:12px 14px; border-radius:12px; opacity:0.65; background:rgba(255,255,255,0.03); }
        .card-crowded .content { font-size:13px; line-height:1.5; color:#8a8e9b; margin-bottom:8px; }
        .card-crowded .card-sign { font-size:11px; margin-bottom:10px; }
        .card-crowded .vote-btn { height:32px; font-size:12px; }
        .content { font-size:15px; line-height:1.75; color:#d8dbe8; margin-bottom:12px; }
        .card-sign { text-align:right; font-size:12px; color:#8a8e9b; margin-bottom:16px; }
        .vote-row { display:flex; gap:10px; }
        .vote-btn { flex:1; height:38px; border-radius:10px; border:none; background:rgba(255,255,255,0.08); color:#b0b6c4; display:flex; align-items:center; justify-content:center; gap:6px; font-size:14px; cursor:pointer; transition:all 0.2s ease; }
        .vote-btn:hover { background:rgba(255,255,255,0.12); }
        .comment-wrap { margin-top:14px; padding-top:14px; border-top:1px solid rgba(255,255,255,0.1); display:none; }
        .comment-wrap.show { display:block; }
        .comment-item { background:rgba(255,255,255,0.05); border-radius:12px; padding:12px; margin-bottom:10px; font-size:14px; color:#b0b6c4; line-height:1.6; }
        .comment-forbid { color:#a87878; text-align:center; font-style:italic; }
        .comment-vote { display:flex; gap:16px; margin-top:8px; font-size:12px; color:#8a8e9b; }
        .comment-vote span { cursor:pointer; }
        .comment-input-row { display:flex; gap:8px; margin-top:12px; }
        .comment-input-row input { flex:1; height:38px; padding:0 14px; border:1px solid rgba(255,255,255,0.12); border-radius:10px; background:rgba(255,255,255,0.06); color:#d8dbe8; font-size:14px; outline:none; }
        .comment-input-row button { height:38px; padding:0 18px; background:#40568e; color:#e6e8f0; border:none; border-radius:10px; font-size:14px; cursor:pointer; }
        .fab { position:fixed; bottom:32px; right:20px; width:58px; height:58px; border-radius:50%; background:#40568e; color:#fff; font-size:26px; border:none; box-shadow:0 0 18px rgba(64,86,142,0.45); z-index:999; animation:breathe 3s ease-in-out infinite; cursor:pointer; }
        @keyframes breathe { 0%,100% { transform:scale(1); } 50% { transform:scale(1.08); } }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.75); z-index:1000; align-items:center; justify-content:center; padding:20px; }
        .modal.show { display:flex; }
        .modal-box { background:#1a1c28; width:100%; border-radius:20px; padding:22px; border:1px solid rgba(255,255,255,0.1); }
        .modal-title { font-size:17px; color:#e6e8f0; text-align:center; margin-bottom:14px; }
        .modal-textarea { width:100%; height:110px; border:1px solid rgba(255,255,255,0.12); border-radius:14px; padding:14px; font-size:15px; background:rgba(255,255,255,0.05); color:#d8dbe8; resize:none; outline:none; margin-bottom:8px; }
        .sign-input { width:100%; height:42px; padding:0 14px; border:1px solid rgba(255,255,255,0.12); border-radius:12px; background:rgba(255,255,255,0.05); color:#d8dbe8; font-size:14px; outline:none; margin-bottom:8px; }
        .count-tip { text-align:right; font-size:12px; color:#8a8e9b; margin-bottom:12px; }
        .count-tip.warn { color:#e08080; }
        .modal-btns { display:flex; gap:12px; }
        .btn { flex:1; height:46px; border-radius:12px; border:none; font-size:15px; cursor:pointer; }
        .btn-cancel { background:rgba(255,255,255,0.08); color:#b0b6c4; }
        .btn-submit { background:#40568e; color:#fff; }
        .btn-submit:disabled { opacity:0.5; cursor:not-allowed; }
        .loading { text-align:center; padding:40px; color:#8a8e9b; }
    </style>
</head>
<body>
    <div class="header"><h1>一言就顶</h1><p>请随意吐槽，要上头条点 👍，要拉人下榜点 👎</p></div>
    <div class="rank-container"><div class="rank-list" id="rankList"><div class="loading">加载中...</div></div></div>
    <button class="fab" id="openModal">+</button>
    <div class="modal" id="modal">
        <div class="modal-box">
            <div class="modal-title">说句话 顶上去</div>
            <textarea class="modal-textarea" id="postText" placeholder=""></textarea>
            <input class="sign-input" id="signText" placeholder="请签名" maxlength="6">
            <div class="count-tip" id="postCount">0 / 120（15-120字）</div>
            <div class="modal-btns">
                <button class="btn btn-cancel" id="closeModal">取消</button>
                <button class="btn btn-submit" id="submitPostBtn">发布上榜</button>
            </div>
        </div>
    </div>
    <script>
        (function(){
            // ==================== 请替换成你自己的 Supabase 配置 ====================
            const SUPABASE_URL = 'https://hlkudwvzrkmdkidxuia.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_L2oaE67FWmUre9aVSOydnQ_gaSragbT';
            // =====================================================================

            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // 字数配置（与你的数据库 sys_config 保持一致）
            const POST_MIN = 15, POST_MAX = 120;
            const COMMENT_MIN = 6, COMMENT_MAX = 60;
            const POST_DOWN_HIDE = 30, COMMENT_DOWN_HIDE = 20, RANK_NORMAL_BOUND = 50;

            // DOM 元素
            const modal = document.getElementById('modal');
            const openModal = document.getElementById('openModal');
            const closeModal = document.getElementById('closeModal');
            const postText = document.getElementById('postText');
            const signText = document.getElementById('signText');
            const postCount = document.getElementById('postCount');
            const submitBtn = document.getElementById('submitPostBtn');
            const rankList = document.getElementById('rankList');

            function escapeHtml(str) {
                if (!str) return '';
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            async function loadPosts() {
                const { data, error } = await supabase
                    .from('posts')
                    .select('*, comments(count)')
                    .eq('status', 1)
                    .order('upvotes', { ascending: false })
                    .limit(100);

                if (error) {
                    rankList.innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
                    console.error(error);
                    return;
                }

                rankList.innerHTML = '';
                data.forEach((post, idx) => {
                    if (post.downvotes >= POST_DOWN_HIDE) return;
                    let cardClass = 'card-normal';
                    if (idx === 0) cardClass = 'card-gold';
                    else if (idx === 1) cardClass = 'card-silver';
                    else if (idx === 2) cardClass = 'card-bronze';
                    else if (idx >= RANK_NORMAL_BOUND) cardClass = 'card-crowded';

                    const card = document.createElement('div');
                    card.className = `card ${cardClass}`;
                    card.dataset.postId = post.id;
                    const commentCount = (post.comments && post.comments[0]) ? post.comments[0].count : 0;
                    card.innerHTML = `
                        <div class="content">${escapeHtml(post.content)}</div>
                        <div class="card-sign">${escapeHtml(post.signature || '匿名')}</div>
                        <div class="vote-row">
                            <div class="vote-btn">👍 ${post.upvotes || 0}</div>
                            <div class="vote-btn">👎 ${post.downvotes || 0}</div>
                            <div class="vote-btn reply-btn">💬 回复 (${commentCount})</div>
                        </div>
                        <div class="comment-wrap">
                            <div class="comment-list"></div>
                            <div class="comment-input-row">
                                <input type="text" placeholder="写下你的看法（6-60字）" class="comment-input">
                                <button class="comment-submit">发送</button>
                            </div>
                        </div>
                    `;
                    rankList.appendChild(card);
                });

                // 评论展开
                document.querySelectorAll('.reply-btn').forEach(btn => {
                    btn.onclick = function() {
                        const wrap = this.closest('.card').querySelector('.comment-wrap');
                        wrap.classList.toggle('show');
                        if (wrap.classList.contains('show')) loadComments(this.closest('.card').dataset.postId);
                    };
                });
                // 点赞点踩
                document.querySelectorAll('.vote-btn').forEach(btn => {
                    if (btn.classList.contains('reply-btn')) return;
                    btn.onclick = async function() {
                        const postId = this.closest('.card').dataset.postId;
                        const type = this.textContent.includes('👍') ? 'up' : 'down';
                        const field = type === 'up' ? 'upvotes' : 'downvotes';
                        const { data: curr } = await supabase.from('posts').select(field).eq('id', postId).single();
                        const newVal = (curr[field] || 0) + 1;
                        await supabase.from('posts').update({ [field]: newVal }).eq('id', postId);
                        loadPosts();
                    };
                });
            }

            async function loadComments(postId) {
                const commentList = document.querySelector(`.card[data-post-id="${postId}"] .comment-list`);
                commentList.innerHTML = '<div style="text-align:center;padding:10px;">加载中...</div>';
                const { data, error } = await supabase
                    .from('comments')
                    .select('*')
                    .eq('post_id', postId)
                    .order('created_at', { ascending: true });
                if (error) {
                    commentList.innerHTML = '<div style="text-align:center;padding:10px;">评论加载失败</div>';
                    return;
                }
                commentList.innerHTML = '';
                data.forEach(comment => {
                    const item = document.createElement('div');
                    item.className = `comment-item ${comment.downvotes >= COMMENT_DOWN_HIDE ? 'comment-forbid' : ''}`;
                    if (comment.downvotes >= COMMENT_DOWN_HIDE) {
                        item.innerHTML = `有伤天和，被判关小黑屋一万年<div class="comment-vote"><span>👍 ${comment.upvotes||0}</span><span>👎 ${comment.downvotes||0}</span></div>`;
                    } else {
                        item.innerHTML = `${escapeHtml(comment.content)}<div class="comment-vote"><span class="comment-upvote" data-comment-id="${comment.id}">👍 ${comment.upvotes||0}</span><span class="comment-downvote" data-comment-id="${comment.id}">👎 ${comment.downvotes||0}</span></div>`;
                    }
                    commentList.appendChild(item);
                });

                const submitBtnEl = document.querySelector(`.card[data-post-id="${postId}"] .comment-submit`);
                const inputEl = document.querySelector(`.card[data-post-id="${postId}"] .comment-input`);
                if (submitBtnEl) {
                    submitBtnEl.onclick = async () => {
                        const content = inputEl.value.trim();
                        if (content.length < COMMENT_MIN || content.length > COMMENT_MAX) {
                            alert(`评论需${COMMENT_MIN}-${COMMENT_MAX}字`);
                            return;
                        }
                        await supabase.from('comments').insert([{ post_id: postId, content, upvotes: 0, downvotes: 0 }]);
                        inputEl.value = '';
                        loadComments(postId);
                    };
                }
                document.querySelectorAll('.comment-upvote, .comment-downvote').forEach(span => {
                    span.onclick = async function() {
                        const commentId = this.dataset.commentId;
                        const type = this.classList.contains('comment-upvote') ? 'up' : 'down';
                        const field = type === 'up' ? 'upvotes' : 'downvotes';
                        const { data: curr } = await supabase.from('comments').select(field).eq('id', commentId).single();
                        const newVal = (curr[field] || 0) + 1;
                        await supabase.from('comments').update({ [field]: newVal }).eq('id', commentId);
                        loadComments(postId);
                    };
                });
            }

            async function handlePublish() {
                const content = postText.value.trim();
                const signature = signText.value.trim() || '匿名';
                if (content.length < POST_MIN || content.length > POST_MAX) {
                    alert(`槽点需${POST_MIN}-${POST_MAX}字`);
                    return;
                }
                submitBtn.disabled = true;
                submitBtn.textContent = '发布中...';
                // 注意：你的 posts 表有 topic_id 字段，默认0表示“全部”
                const { error } = await supabase.from('posts').insert([{
                    content, signature, status: 1, upvotes: 0, downvotes: 0, topic_id: 0
                }]);
                if (error) {
                    alert('发布失败：' + error.message);
                    submitBtn.disabled = false;
                    submitBtn.textContent = '发布上榜';
                    return;
                }
                modal.classList.remove('show');
                submitBtn.disabled = false;
                submitBtn.textContent = '发布上榜';
                loadPosts();
            }

            function checkCount() {
                const len = postText.value.length;
                postCount.innerText = `${len} / ${POST_MAX}（${POST_MIN}-${POST_MAX}字）`;
                if (len < POST_MIN || len > POST_MAX) {
                    postCount.classList.add('warn');
                    submitBtn.disabled = true;
                } else {
                    postCount.classList.remove('warn');
                    submitBtn.disabled = false;
                }
            }

            function bindEvents() {
                openModal.onclick = () => {
                    modal.classList.add('show');
                    postText.value = '';
                    signText.value = '';
                    checkCount();
                };
                closeModal.onclick = () => modal.classList.remove('show');
                postText.addEventListener('input', checkCount);
                submitBtn.onclick = handlePublish;
            }

            function init() {
                bindEvents();
                loadPosts();
            }
            init();
        })();
    </script>
</body>
</html>
